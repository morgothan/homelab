# Route to the right ttyd instance based on the Remote-User header set by Authelia.
# To add a new user: add a line to the map block and bring up a new ttyd-<user> container.
# Unknown users get 403 (caught by Traefik error-pages middleware).

map $http_remote_user $ttyd_backend {
    nat     http://ttyd-user:7681;
}

server {
    listen 80;

    # Health check endpoint for Docker healthcheck / Traefik
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        if ($ttyd_backend = "") {
            return 403;
        }

        resolver            127.0.0.11 valid=30s;
        proxy_pass          $ttyd_backend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
