<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>500 Internal Server Error</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Black Ops One', Impact, 'Arial Black', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .code {
      font-size: clamp(6rem, 25vw, 16rem);
      line-height: 1;
      color: #ff2200;
      text-shadow:
        0 0 10px #ff2200,
        0 0 30px #ff4400,
        3px 3px 0 #7a0000,
        -1px -1px 0 #000;
      animation: flicker 4s infinite;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96%            { opacity: 0.85; }
      97%            { opacity: 1; }
      98%            { opacity: 0.7; }
      99%            { opacity: 1; }
    }

    .message {
      font-size: clamp(1rem, 4vw, 2.2rem);
      letter-spacing: 0.12em;
      color: #fff;
      text-transform: uppercase;
      margin-top: 8px;
      text-shadow: 0 0 10px rgba(255,34,0,0.5);
    }

    .hint {
      font-family: monospace;
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.2em;
      margin-top: 20px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="code">500</div>
  <div class="message">Internal Server Error</div>
  <p class="hint">something went wrong on our end</p>
</body>
</html>
