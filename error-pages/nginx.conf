server {
    listen 80;
    root /var/www;

    # Serve error page files directly (used by Traefik's test-errors middleware subrequests)
    location ~ "^/[0-9]{3}\.html$" {
        try_files $uri =500;
    }

    # Everything else: return 404 so the catch-all router triggers test-errors
    location / {
        return 404;
    }
}
