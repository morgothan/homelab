# Rule exclusions applied before CRS rules run.
#
# Rule 930130 (Restricted File Access Attempt) fires on filenames containing
# words like "password" which appears in Authelia's compiled JS chunk names
# (e.g. services.Password.DwwzvKq6.js). JavaScript files cannot be LFI
# vectors so exclude this rule for .js requests.
SecRule REQUEST_FILENAME "@endsWith .js" \
    "id:9000001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleRemoveById=930130"
