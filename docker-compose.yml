  kopia-ui:
    image: kopia/kopia:latest
    container_name: kopia-webui
    restart: unless-stopped
    logging: *logging
    #ports:
    #  - "5151:5151"
    networks:
      - ${DOCKERNET} 
    volumes:
      - ${DOCKERDIR}/kopia/config:/app/config
      - ${DOCKERDIR}/kopia/cache:/app/cache
      - /root/.config/rclone/rclone.conf:/app/rclone/rclone.conf:ro
    command:
      - server
      - start
      - --address=0.0.0.0:5151
      - --config-file=/app/config/repository.config
