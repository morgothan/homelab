      - traefik.enable=true
      - traefik.http.routers.gotify-http.entrypoints=https
      - traefik.http.routers.gotify-http.rule=Host(`gotify.${DOMAIN}`)
      - traefik.http.routers.gotify-http.middlewares=chain-authelia@file
      - traefik.http.routers.gotify-http.service=gotify
      - traefik.http.services.gotify.loadbalancer.server.port=80
        #local access
