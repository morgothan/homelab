###### Redis #######
  redis:
    image: redis:latest
      #image: docker.io/valkey/valkey:latest
    container_name: redis
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${DOCKERDIR}/redis:/data
    networks:
      - ${DOCKERNET}
        #    expose:
        #      - 6379
    restart: unless-stopped
    logging: *logging
    command: ["redis-server", "--appendonly", "no", "--maxmemory-policy", "noeviction"]
    environment:
      - PUID=1000
      - PGID=1000
    labels:
      - traefik.enable=true
      - traefik.tcp.routers.redis-tcp.entrypoints=tcp_redis
      - traefik.tcp.routers.redis-tcp.rule=ClientIP(`192.168.0.0/16`)
      - traefik.tcp.routers.redis-tcp.service=redis
      - traefik.tcp.services.redis.loadbalancer.server.port=6379


###### Redis exporter #####
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    depends_on:
      - redis
    restart: unless-stopped
    logging: *logging
    networks:
      - ${DOCKERNET}
    command:
      - '--redis.addr=redis://redis:6379'

####### Guacamole ########       
  guacamole:
    container_name: guacamole
    image: jwetzell/guacamole:latest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${DOCKERDIR}/guac:/config
      - /usr/share/fonts:/usr/share/fonts
      - /etc/fonts:/etc/fonts
    restart: unless-stopped
    logging: *logging
    networks:
      - ${DOCKERNET}
    environment:
      - EXTENSIONS=auth-sso-openid
      - LOG_LEVEL=debug
    labels:
      - traefik.enable=true
      - traefik.http.routers.guac-http.entrypoints=https
      - traefik.http.routers.guac-http.rule=Host(`guac.${DOMAIN}`)
      # 1. Define the Middleware (ensure X-Forwarded-Proto is passed)
      - traefik.http.middlewares.guac-headers.headers.customrequestheaders.X-Forwarded-Proto=https
#      - traefik.http.routers.guac-http.middlewares=chain-authelia@file
      - traefik.http.routers.guac-http.middlewares=guac-headers,chain-authelia@file
      - traefik.http.routers.guac-http.service=guac
      - traefik.http.services.guac.loadbalancer.server.port=8080
        
#############3 Gotify Notifications #######3        
  gotify:
    image: gotify/server:latest
    restart: unless-stopped
    logging: *logging
    container_name: gotify
    networks:
      - ${DOCKERNET}
      #    ports:
      #      - 80:80
    environment:
      - GOTIFY_DEFAULTUSER_PASS=${GOTIFY_DEFAULTUSER_PASS}
