      - traefik.http.routers.gotify-http-local.rule=Host(`gotify.${LOCAL}`)
      - traefik.http.routers.gotify-http-local.service=gotify


############ dium notify of updated docker images        
  diun:
    image: crazymax/diun:latest
    container_name: diun
    command: serve
    volumes:
      - "${DOCKERDIR}/data:/data"
      - "/home/nat/.docker/config.json:/root/.docker/config.json:ro"
      - "/var/run/docker.sock:/var/run/docker.sock"
    environment:
      - "DIUN_WATCH_WORKERS=20"
      - "DIUN_WATCH_SCHEDULE=0 */6 * * *"
      - "DIUN_WATCH_JITTER=30s"
      - "DIUN_PROVIDERS_DOCKER=true"
      - "DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT=true"
      - "DIUN_NOTIF_GOTIFY_ENDPOINT=http://gotify"
      - "DIUN_NOTIF_GOTIFY_TOKEN=${DIUN_GOTIFY_TOKEN}"
      - "DIUN_NOTIF_GOTIFY_PRIORITY=1"
      - "DIUN_NOTIF_GOTIFY_TIMEOUT=10s"
    labels:
      - "diun.enable=true"
    restart: unless-stopped
    logging: *logging
    networks:
      - ${DOCKERNET}

########### NUT (Network UPS Tool) ##########
  nut:
    container_name: nut
    image: instantlinux/nut-upsd:latest
    restart: unless-stopped
    logging: *logging
    networks: 
      - ${DOCKERNET}
        #ports: 
        # - 3493
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${DOCKERDIR}/nut:/etc/nut
