########## Gotify
# Push notification server — receives Docker image update alerts from Diun
  gotify:
    image: gotify/server:latest
    restart: unless-stopped
    logging: *logging
    container_name: gotify
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - ${DOCKERNET}
      #    ports:
      #      - 80:80
    environment:
      - GOTIFY_DEFAULTUSER_PASS=${GOTIFY_DEFAULTUSER_PASS}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${DOCKERDIR}/gotify:/app/data
    labels:
      - traefik.enable=true
      # Main router: strip cached browser Basic-auth creds before Authelia sees them (prevents banning)
      - traefik.http.routers.gotify-http.entrypoints=https
      - traefik.http.routers.gotify-http.rule=Host(`gotify.${DOMAIN}`)
      - traefik.http.routers.gotify-http.middlewares=strip-auth-header@file,chain-authelia-nowaf@file,gotify-strip-wwwauth
      - traefik.http.routers.gotify-http.service=gotify
      - traefik.http.services.gotify.loadbalancer.server.port=80
      # Login router (higher priority): /client is Gotify's own login endpoint — needs Basic auth
      # to reach Gotify, so skip strip-auth-header. No Authelia needed; Gotify validates credentials.
      - traefik.http.routers.gotify-login.entrypoints=https
      - traefik.http.routers.gotify-login.rule=Host(`gotify.${DOMAIN}`) && Path(`/client`)
      - traefik.http.routers.gotify-login.priority=100
      - traefik.http.routers.gotify-login.middlewares=chain-no-auth-no-waf@file,gotify-strip-wwwauth
      - traefik.http.routers.gotify-login.service=gotify
      # Strip WWW-Authenticate from all Gotify responses — prevents browser from caching
      # Gotify credentials as Basic auth and replaying them to Authelia (causing bans)
      - traefik.http.middlewares.gotify-strip-wwwauth.headers.customresponseheaders.WWW-Authenticate=""
        #local access
      - traefik.http.routers.gotify-http-local.entrypoints=http
      - traefik.http.routers.gotify-http-local.rule=Host(`gotify.${LOCAL}`)
      - traefik.http.routers.gotify-http-local.service=gotify


########## Diun
# Watches for Docker image updates and sends alerts to Gotify
  diun:
    image: crazymax/diun:latest
    container_name: diun
    command: serve
    volumes:
      - "${DOCKERDIR}/data:/data"
      - "/home/nat/.docker/config.json:/root/.docker/config.json:ro"
      - "/var/run/docker.sock:/var/run/docker.sock"
    environment:
      - "DIUN_WATCH_WORKERS=20"
      - "DIUN_WATCH_SCHEDULE=0 */6 * * *"
      - "DIUN_WATCH_JITTER=30s"
      - "DIUN_PROVIDERS_DOCKER=true"
      - "DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT=true"
      - "DIUN_NOTIF_GOTIFY_ENDPOINT=http://gotify"
      - "DIUN_NOTIF_GOTIFY_TOKEN=${DIUN_GOTIFY_TOKEN}"
      - "DIUN_NOTIF_GOTIFY_PRIORITY=1"
      - "DIUN_NOTIF_GOTIFY_TIMEOUT=10s"
    labels:
      - "diun.enable=true"
    restart: unless-stopped
    logging: *logging
    networks:
      - ${DOCKERNET}

