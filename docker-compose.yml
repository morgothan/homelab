      - --server-password=${KOPIA_PASS}
      - --password=${KOPIA_REPO_PW}
      - --insecure
    labels:
      - traefik.enable=true
      #external access
      - traefik.http.routers.kopia-ui-http.entrypoints=https
      - traefik.http.routers.kopia-ui-http.rule=Host(`kopia.${DOMAIN}`)
      - traefik.http.routers.kopia-ui-http.middlewares=chain-authelia@file
