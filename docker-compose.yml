x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"

services:
########## Cloudflare Tunnel
# Connects to Cloudflare Zero Trust — routes all external HTTPS traffic to this host
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cf_tunnel
    restart: unless-stopped
    logging: *logging
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN}
      - TUNNEL_LOGLEVEL=warn
      - TUNNEL_METRICS=0.0.0.0:60123
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:60123/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      #- cftunnel-transport
      - ${DOCKERNET}
        
########## Traefik
# Reverse proxy and SSL termination for all services
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: always
    logging: *logging
    networks:
      - ${DOCKERNET}
      #- cftunnel-transport
    ports:
      - 80:80
      - 443:443
      - 8082:8082
      - 3493:3493
      - 6379:6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DOCKERDIR}/traefik/traefik.yml:/traefik.yml:ro
      - ${DOCKERDIR}/traefik/ban.html:/ban.html:ro
      - ${DOCKERDIR}/traefik/configs:/configs:ro
      - ${DOCKERDIR}/traefik/plugins:/plugins-storage:rw
      - ${DOCKERDIR}/traefik/acme.json/acme.json:/acme.json:rw
      - ${DOCKERDIR}/traefik/logs:/logs:rw
        #      - ${DOCKERDIR}/.htpasswd:/.htpasswd:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      #  - TZ=America/New_York
      #- CF_DNS_API_TOKEN=${CFAPI}
      - CF_API_EMAIL=${CF_API_EMAIL}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    command:
      - --serverstransport.insecureskipverify=true
        #      - --experimental.plugins.traefik-modsecurity-plugin.modulename=github.com/acouvreur/traefik-modsecurity-plugin
        #      - --experimental.plugins.traefik-modsecurity-plugin.version=v1.3.0        
        #      - --providers.docker=true        
    read_only: true
    security_opt:
      - no-new-privileges=true
    labels:
      - traefik.enable=true
        # externall access
        #- traefik.http.routers.traefik-http.entrypoints=http
        #- traefik.http.routers.traefik-http.rule=Host(`traefik.${DOMAIN}`)
        #- traefik.http.routers.traefik-http.middlewares=chain-authelia@file
        #- traefik.http.routers.traefik-http.service=api@internal
        # local access
      - traefik.http.routers.traefik-http-local.entrypoints=http
      - traefik.http.routers.traefik-http-local.rule=Host(`traefik.${LOCAL}`)
      - traefik.http.routers.traefik-http-local.service=api@internal
        # https access
      - traefik.http.routers.traefik-https.entrypoints=https
      - traefik.http.routers.traefik-https.rule=Host(`traefik.${DOMAIN}`)
      - traefik.http.routers.traefik-https.middlewares=chain-authelia@file
      - traefik.http.routers.traefik-https.service=api@internal
      - traefik.http.routers.traefik-https.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik-https.tls.domains[0].main=${DOMAIN}
      - traefik.http.routers.traefik-https.tls.domains[0].sans=*.${DOMAIN}
      - traefik.http.routers.traefik-https.tls.domains[1].main=${PUBLIC}
      - traefik.http.routers.traefik-https.tls.domains[1].sans=*.${PUBLIC}
      - traefik.http.routers.traefik-https.tls.domains[2].main=${HEYSHUTUP}
      - traefik.http.routers.traefik-https.tls.domains[2].sans=*.${HEYSHUTUP}
        #      - traefik.http.routers.traefik-https.tls2.certresolver=http
        #      - traefik.http.routers.traefik-https.tls2.domains[0].main=${PUBLIC}
        #      - traefik.http.routers.traefik-https.tls2.domains[0].sans=*.${PUBLIC}
########## Error Pages
# Serves custom error pages for Traefik (4xx/5xx)
  error-pages:
    volumes:
      - ${DOCKERDIR}/error-pages:/var/www/
    image: busybox:latest
    container_name: error-pages
    command: httpd -f -h /var/www/
    restart: unless-stopped
    logging: *logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/404.html || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - ${DOCKERNET}
    labels:
      - traefik.enable=true
        #      - traefik.http.routers.error-pages-https.entrypoints=https
        #      - traefik.http.routers.error-pages-https.rule=Host(`error-pages`)
      - traefik.http.services.error-pages.loadbalancer.server.port=80
########## WAF (ModSecurity / OWASP CRS)
# Web application firewall sidecar used by Traefik's chain-authelia and chain-no-auth
  waf:
    container_name: waf
      #image: owasp/modsecurity-crs:nginx-alpine
    image: owasp/modsecurity-crs:nginx-alpine
    restart: unless-stopped
    logging: *logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - PARANOIA=1
      - ANOMALY_INBOUND=10
      - ANOMALY_OUTBOUND=5
      - BACKEND=http://dummy
      - REPORTING_LEVEL=2
      - MODSEC_AUDIT_LOG_FORMAT=JSON
      - MODSEC_RULE_ENGINE=On
      - UID=1000
    networks:
      - ${DOCKERNET}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${DOCKERDIR}/waf_logs:/var/log/nginx:rw

########## Whoami (WAF Dummy Backend)
# Dummy HTTP 200 backend required by the WAF sidecar container
  dummy:
    container_name: dummy
    image: traefik/whoami:latest
    restart: unless-stopped
    logging: *logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - ${DOCKERNET}
    labels:
      - traefik.enable=true
      #external access  
      - traefik.http.routers.whoami-http.entrypoints=https
      - traefik.http.routers.whoami-http.rule=Host(`whoami.${DOMAIN}`)
      - traefik.http.routers.whoami-http.middlewares=chain-authelia@file
        #      - traefik.http.routers.whoami-http.middlewares=waf@file
      - traefik.http.routers.whoami-http.service=whoami
      #local access
      - traefik.http.routers.whoami-http-local.entrypoints=http
      - traefik.http.routers.whoami-http-local.rule=Host(`whoami.${LOCAL}`)
      - traefik.http.routers.whoami-http-local.service=whoami
  
      - traefik.http.services.whoami.loadbalancer.server.port=80

########## Homepage
# Dashboard with service widgets, status monitoring, and quick links
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ${DOCKERNET}
    volumes:
      - ${DOCKERDIR}/homepage:/app/config # Make sure your local config directory exists
      - /var/run/docker.sock:/var/run/docker.sock:ro # (optional) For docker integrations, see alternative methods
      - ${DOCKERDIR}/homepage/images:/app/public/images
      - ${DOCKERDIR}/homepage/icons:/app/public/icons
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=home.${DOMAIN},homepage.${DOMAIN}
    restart: unless-stopped
    logging: *logging
    labels:
      - traefik.enable=true
      - traefik.http.routers.homepage-http.entrypoints=https
      - traefik.http.routers.homepage-http.rule=Host(`home.${DOMAIN}`)
        #- traefik.http.routers.heimdall-http.middlewares=chain-oauth@file
      - traefik.http.routers.homepage-http.middlewares=chain-authelia@file
        #      - traefik.http.routers.heimdall-http.middlewares=modsecurity@file
      - traefik.http.routers.homepage-http.service=homepage
      - traefik.http.services.homepage.loadbalancer.server.port=3000
      
########## Portainer
# Docker management UI with OIDC login via Authelia
  portainer:
    image: portainer/portainer-ce:latest
    command: -H unix:///var/run/docker.sock
    container_name: portainer
    restart: unless-stopped
    logging: *logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - ${DOCKERNET}
    labels:
      # Frontend
      - traefik.enable=true
      - traefik.http.routers.frontend.entrypoints=https
      - traefik.http.routers.frontend.rule=Host(`portainer.${DOMAIN}`)
      - traefik.http.routers.frontend.middlewares=chain-authelia-nowaf@file
        #- traefik.http.routers.frontend.middlewares=chain-oauth@file
      - traefik.http.routers.frontend.service=frontend
      - traefik.http.services.frontend.loadbalancer.server.port=9000


########## Prometheus
# Metrics collection and storage, scrapes all exporters on a 15s interval
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - ${DOCKERNET}
    restart: unless-stopped
    logging: *logging
    volumes:
      - ${DOCKERDIR}/prometheus/etc:/etc/prometheus
      - prometheus_data:/prometheus
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    labels:
      - traefik.enable=true
        #external access  
      - traefik.http.routers.prometheus-http.entrypoints=https
      - traefik.http.routers.prometheus-http.rule=Host(`prometheus.${DOMAIN}`)
      - traefik.http.routers.prometheus-http.middlewares=chain-authelia@file
        #- traefik.http.routers.influx2-http.middlewares=chain-oauth@file
      - traefik.http.routers.prometheus-http.service=prometheus
      - traefik.http.services.prometheus.loadbalancer.server.port=9090
        #local access
      - traefik.http.routers.prometheus-http-local.entrypoints=http
      - traefik.http.routers.prometheus-http-local.rule=Host(`prometheus.${LOCAL}`)
      - traefik.http.routers.prometheus-http-local.service=prometheus



########## Grafana
# Metrics visualization and dashboards, OIDC login via Authelia
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    logging: *logging
    container_name: grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ${DOCKERNET}
        #    ports:
        # - '3000:3000'
    volumes:
      - grafana-storage:/var/lib/grafana
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      #      - influxdb
      #      - influxdb2
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USERNAME}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,natel-discrete-panel,grafana-piechart-panel
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      - GF_PUBLIC_DASHBOARDS_ENABLED=false
      - GF_FEATURE_TOGGLES_PUBLIC_DASHBOARDS=true
    labels:
      - traefik.enable=true
        #external access  
      - traefik.http.routers.grafana-http.entrypoints=https
      - traefik.http.routers.grafana-http.rule=Host(`grafana.${DOMAIN}`)
      - traefik.http.routers.grafana-http.middlewares=chain-authelia-nowaf@file
        #- traefik.http.routers.grafana-http.middlewares=chain-oauth@file
      - traefik.http.routers.grafana-http.service=grafana
      - traefik.http.services.grafana.loadbalancer.server.port=3000
        #local access
      - traefik.http.routers.grafana-http-local.entrypoints=http
      - traefik.http.routers.grafana-http-local.rule=Host(`grafana.${LOCAL}`)
      - traefik.http.routers.grafana-http-local.service=grafana

########## Promtail
# Ships Docker container logs to Loki via the Docker socket
  promtail:
    command: -config.file=/etc/promtail/promtail-config.yml
    container_name: promtail
    image: grafana/promtail:latest
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9080/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - ${DOCKERNET}
        #    ports:
        #      - "1514:1514"
        #      - "9080:9080"
    restart: unless-stopped
    logging: *logging
    volumes:
      - ${DOCKERDIR}/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro


########## Unifi Poller
# Exports Unifi network and camera metrics to Prometheus and Loki
  unifi-poller:
    restart: unless-stopped
    logging: *logging
    container_name: unifi-poller
    image: ghcr.io/unpoller/unpoller:${POLLER_TAG}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9130/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - grafana
        #      - influxdb
    networks:
      - ${DOCKERNET}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - UP_INFLUXDB_DISABLE=true
      - UP_UNIFI_DEFAULT_USER=${UNIFI_USER}
      - UP_UNIFI_DEFAULT_PASS=${UNIFI_PASS}
      - UP_UNIFI_DEFAULT_URL=${UNIFI_URL}
      - UP_POLLER_DEBUG=${POLLER_DEBUG}
      - UP_UNIFI_DEFAULT_SAVE_DPI=${POLLER_SAVE_DPI}
      - UP_LOKI_DISABLE=false
      - UP_LOKI_URL=http://logger.${LOCAL}:3100

  
        
########## Dozzle
# Live Docker log viewer with remote agents on multiple hosts across the network
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthcheck || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - ${DOCKERNET}
    environment:
      - DOZZLE_REMOTE_AGENT=sketchy-nas.${LOCAL}:7007,beszel.${LOCAL}:7007,whisper.iot.${LOCAL}:7007,smsf.${LOCAL}:7007
      - DOZZLE_AUTH_PROVIDER=forward-proxy
        #DOZZLE_AUTH_PROVIDER: simple
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${DOCKERDIR}/dozzle:/data
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - traefik.enable=true
      - traefik.http.routers.dozzle-http.entrypoints=https
      - traefik.http.routers.dozzle-http.rule=Host(`dozzle.${DOMAIN}`)
        #- traefik.http.routers.dozzle-http.middlewares=chain-authelia@file
      - traefik.http.routers.dozzle-http.middlewares=chain-authelia-nowaf@file
      - traefik.http.routers.dozzle-http.service=dozzle
      - traefik.http.services.dozzle.loadbalancer.server.port=8080
    expose:
      - 8080
    restart: unless-stopped
    logging: *logging

########## Tautulli
# Plex media server analytics and playback history
  tautulli:
    image: ghcr.io/tautulli/tautulli
    container_name: tautulli
    restart: unless-stopped
    logging: *logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8181/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ${DOCKERDIR}/tautulli:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
        #ports:
        #- 8181:8181
    networks:
      - ${DOCKERNET}
    labels:
      - traefik.enable=true
      - traefik.http.routers.tautulli-http.entrypoints=https
      - traefik.http.routers.tautulli-http.rule=Host(`tautulli.${DOMAIN}`)
      - traefik.http.routers.tautulli-http.middlewares=chain-authelia@file
        #- traefik.http.routers.tautulli-http.middlewares=chain-oauth@file
      - traefik.http.routers.tautulli-http.service=tautulli
      - traefik.http.services.tautulli.loadbalancer.server.port=8181
        #local access
      - traefik.http.routers.tautulli-http-local.entrypoints=http
      - traefik.http.routers.tautulli-http-local.rule=Host(`tautulli.${LOCAL}`)
      - traefik.http.routers.tautulli-http-local.service=tautulli

########## Authelia
# SSO, 2FA, and OIDC provider — forward-auth for all external services
  authelia:
    container_name: authelia
    image: authelia/authelia:latest
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9091/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging: *logging
    # profiles: ["core", "all"]
    networks:
      - ${DOCKERNET}
    # ports:
    #   - "9091:9091"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${DOCKERDIR}/authelia:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - DOMAIN
      - LOCAL
      - X_AUTHELIA_CONFIG_FILTERS=template
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE=/run/secrets/authelia_jwt_secret
      - AUTHELIA_SESSION_SECRET_FILE=/run/secrets/authelia_session_secret
      - AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE=/run/secrets/authelia_storage_encryption_key
      - AUTHELIA_NOTIFIER_SMTP_PASSWORD_FILE=/run/secrets/authelia_smtp_password
      - AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET_FILE=/run/secrets/authelia_oidc_hmac_secret
      # OIDC client IDs and secret hashes (referenced via {{ env }} in authelia/configuration.yml)
      - OIDC_BESZEL_CLIENT_ID
      - OIDC_BESZEL_CLIENT_SECRET
      - OIDC_CLOUDFLARE_CLIENT_ID
      - OIDC_CLOUDFLARE_CLIENT_SECRET

      - OIDC_GRAFANA_CLIENT_ID
      - OIDC_GRAFANA_CLIENT_SECRET
      - OIDC_GUACAMOLE_CLIENT_ID
      - OIDC_GUACAMOLE_CLIENT_SECRET
      - OIDC_IMMICH_CLIENT_ID
      - OIDC_IMMICH_CLIENT_SECRET
      - OIDC_MEALIE_CLIENT_ID
      - OIDC_MEALIE_CLIENT_SECRET
      - OIDC_NTFY_CLIENT_ID
      - OIDC_NTFY_CLIENT_SECRET
      - OIDC_OPENWEBUI_CLIENT_ID
      - OIDC_OPENWEBUI_CLIENT_SECRET
      - OIDC_OUTLINE_CLIENT_ID
      - OIDC_OUTLINE_CLIENT_SECRET
      - OIDC_PORTAINER_CLIENT_ID
      - OIDC_PORTAINER_CLIENT_SECRET
      - OIDC_PROXMOX_CLIENT_ID
      - OIDC_PROXMOX_CLIENT_SECRET
      - OIDC_SYNOLOGY_CLIENT_ID
      - OIDC_SYNOLOGY_CLIENT_SECRET
    secrets:
      - authelia_jwt_secret
      - authelia_storage_encryption_key
      - authelia_session_secret
      - authelia_smtp_password
      - authelia_oidc_hmac_secret
    labels:
      - traefik.enable=true
      ## HTTP Routers
      - traefik.http.routers.authelia-rtr.entrypoints=https
      - traefik.http.routers.authelia-rtr.rule=Host(`authelia.${DOMAIN}`)
      ## Middlewares
      - traefik.http.routers.authelia-rtr.middlewares=chain-no-auth-no-cs@file # Should be chain-no-auth and not chain-authelia
      ## HTTP Services
      - traefik.http.routers.authelia-rtr.service=authelia-svc
      - traefik.http.services.authelia-svc.loadbalancer.server.port=9091        

########## AdGuard Exporter
# Exports AdGuard Home metrics (primary + kids) to Prometheus
  adguard-exporter:
    container_name: adguard_exporter
    image: ghcr.io/henrywhitaker3/adguard-exporter:latest
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging: *logging
    networks:
      - ${DOCKERNET}
    environment:
      - ADGUARD_SERVERS=http://dns.${LOCAL},http://dns.kids.${LOCAL}
      - ADGUARD_USERNAMES=admin,admin
      - ADGUARD_PASSWORDS=${ADGUARD_PASSWORDS}
      - INTERVAL=15s
########## Tdarr Exporter
# Exports Tdarr media transcoding metrics to Prometheus
  tdarr-exporter:
    image: homeylab/tdarr-exporter:latest
    container_name: tdarr-exporter
    restart: unless-stopped
    logging: *logging
    environment:
      - TDARR_URL=http://smsf.${LOCAL}:30088
      - HTTP_MAX_CONCURRENCY=10
    networks:
      - ${DOCKERNET}


########## Proxmox VE Exporter
# Exports Proxmox host and VM metrics to Prometheus
  pve-exporter:
    init: true
    container_name: pve-exporter
    restart: unless-stopped
    logging: *logging
    networks:
      - ${DOCKERNET}
    volumes:
      - ${DOCKERDIR}/pve/pve.yml:/etc/prometheus/pve.yml
    image: prompve/prometheus-pve-exporter:latest


########## Redis
# Shared session store for Authelia (db 0) and Traefik (db 1), exposed to LAN on :6379
  redis:
    image: redis:latest
      #image: docker.io/valkey/valkey:latest
    container_name: redis
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
