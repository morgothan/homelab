########### NUT (Network UPS Tool) exporter #########
  nut-exporter:
    container_name: nut-exporter
    restart: unless-stopped
    logging: *logging
    depends_on:
      - nut
    networks:
      - ${DOCKERNET}
        #ports:
        # - "9995:9995/tcp"
    image: hon95/prometheus-nut-exporter:latest
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - HTTP_PATH=/metrics
      - RUST_LOG=info
      - HTTP_PORT=9995
      - HTTP_PATH=/nut
      - LOG_REQUESTS_CONSOLE=false
      - PRINT_METRICS_AND_EXIT=false

############### Overseerr (add content to plex via radarr/sonarr) ######
  overseerr:
#    image: sctx/overseerr:latest
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: overseerr
    environment:
      - LOG_LEVEL=debug
      - PORT=5055 #optional
    networks:
      - ${DOCKERNET}
#    ports:
#      - 5055:5055
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${DOCKERDIR}/jellyseerr:/app/config
    restart: unless-stopped
    logging: *logging
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
