########## Guacamole
# Web-based remote desktop gateway with OIDC login (implicit grant — PKCE not supported)
  guacamole:
    container_name: guacamole
    image: jwetzell/guacamole:latest
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ${DOCKERDIR}/guac:/config
      - ${DOCKERDIR}/guac/fonts:/usr/share/fonts/truetype/nerdfonts:ro
      - ${DOCKERDIR}/guac/custom-cont-init.d/10-fonts.sh:/etc/cont-init.d/10-fonts.sh:ro
    restart: unless-stopped
    logging: *logging
    networks:
      - ${DOCKERNET}
    environment:
      - EXTENSIONS=auth-sso-openid
      - LOG_LEVEL=warn
      # JVM heap tuning: prevents GC pauses from causing sporadic input lag
      - CATALINA_OPTS=-Xms256m -Xmx768m -XX:+UseG1GC -XX:MaxGCPauseMillis=100
    labels:
      - traefik.enable=true
      # External HTTPS via Cloudflare Tunnel
      - traefik.http.routers.guac-http.entrypoints=https
      - traefik.http.routers.guac-http.rule=Host(`guac.${DOMAIN}`)
      - traefik.http.middlewares.guac-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.routers.guac-http.middlewares=guac-headers,chain-authelia-nowaf@file
      - traefik.http.routers.guac-http.service=guac
      - traefik.http.services.guac.loadbalancer.server.port=8080
      # Local access — bypasses Cloudflare Tunnel entirely (much lower latency on LAN)
      - traefik.http.routers.guac-http-local.entrypoints=http
      - traefik.http.routers.guac-http-local.rule=Host(`guac.${LOCAL}`)
      - traefik.http.routers.guac-http-local.service=guac


