    labels:
      - traefik.enable=true
      - traefik.http.routers.overseerr-http.entrypoints=https
      - traefik.http.routers.overseerr-http.rule=Host(`overseerr.${DOMAIN}`)
      - traefik.http.routers.overseerr-http.middlewares=chain-authelia@file
      - traefik.http.routers.overseerr-http.service=overseerr
      - traefik.http.services.overseerr.loadbalancer.server.port=5055
        #local access
      - traefik.http.routers.overseerr-http-local.entrypoints=http
      - traefik.http.routers.overseerr-http-local.rule=Host(`overseerr.${LOCAL}`)
      - traefik.http.routers.overseerr-http-local.service=overseerr


################ beszel monitoring agent ################
  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: "beszel-agent"
    restart: unless-stopped
    logging: *logging
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # monitor other disks / partitions by mounting a folder in /extra-filesystems
      # - /mnt/disk/.beszel:/extra-filesystems/sda1:ro
    environment:
      - PORT=45876
      - KEY=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIP8RIrxvJtdqYq+V+oU+2vdgYupX6vcN1r2I32UGzX8s



  postgres:
    image: postgres:17
    container_name: "postgres"
    restart: unless-stopped
    logging: *logging
    env_file: .env
    networks:
      - ${DOCKERNET} 
    # ports "5432"
    volumes:
      - ${DOCKERDIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${PGDB}", "-U", "${PGUSER}"]
      interval: 30s
      timeout: 20s
      retries: 3
    environment:
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD=${PGPASS}
      - POSTGRES_DB=${PGDB}

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: "postgres_exporter"
    restart: unless-stopped
    logging: *logging
    depends_on:
      postgres:
        condition: service_healthy
    networks: 
      - ${DOCKERNET}
    environment:
      - DATA_SOURCE_URI=postgres:5432/postgres?sslmode=disable
      - DATA_SOURCE_USER=${PGUSER}
      - DATA_SOURCE_PASS=${PGPASS}

