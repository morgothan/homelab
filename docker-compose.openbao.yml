# OpenBao self-hosted secrets manager (open-source Vault fork).
# Bootstrap: see docs/superpowers/plans/2026-05-20-openbao-migration.md Task 2.
# Start: docker compose -f docker-compose.openbao.yml up -d

name: openbao

x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"

services:
  openbao:
    image: quay.io/openbao/openbao:2.5.4
    container_name: openbao
    restart: unless-stopped
    logging: *logging
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
    volumes:
      - ./openbao/config:/openbao/config:ro
      - openbao-data:/openbao/data
    command: ["bao", "server", "-config=/openbao/config/openbao.hcl"]
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "bao status 2>/dev/null; [ $? -ne 1 ]"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - proxy
      - bao-internal

  openbao-unsealer:
    image: alpine:3.23.4
    container_name: openbao-unsealer
    restart: unless-stopped
    logging: *logging
    depends_on:
      openbao:
        condition: service_started
    volumes:
      - ./.bao-unseal-key:/bao-unseal-key:ro
      - ./openbao/unsealer/unseal.sh:/unseal.sh:ro
    command: ["sh", "/unseal.sh"]
    user: "1000:1000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - bao-internal

volumes:
  openbao-data:

networks:
  proxy:
    external: true
  bao-internal:
    internal: true
