        userinfo_signed_response_alg: 'none'
          #        claims_policy: 'default'

#GUACAMOLE
      - client_id: '{{ env "OIDC_GUACAMOLE_CLIENT_ID" }}'
        client_name: 'guacamole'
        client_secret: '{{ env "OIDC_GUACAMOLE_CLIENT_SECRET" }}'
        public: false
        authorization_policy: 'two_factor'
        require_pkce: false
        pkce_challenge_method: ''
        redirect_uris:
          - 'https://guac.{{ env "DOMAIN" }}'
        scopes:
          - 'openid'
          - 'profile'
          - 'groups'
          - 'email'
        response_types:
          - 'id_token'
        grant_types:
          - 'implicit'
        userinfo_signed_response_alg: 'none'
        claims_policy: 'default'  #needed since guac no longer works with the updated authelia oidc settings
        token_endpoint_auth_method: 'client_secret_basic'


